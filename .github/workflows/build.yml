name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # تم تصحيح المسار البرمجي لجميع المراجع هنا بالكامل
      - name: Fix Missing Version Catalog
        run: |
          mkdir -p gradle
          echo '[versions]' > gradle/libs.versions.toml
          echo 'compose = "1.6.0"' >> gradle/libs.versions.toml
          echo 'kotlin = "1.9.20"' >> gradle/libs.versions.toml
          echo '[plugins]' >> gradle/libs.versions.toml
          echo 'kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version = "1.9.20" }' >> gradle/libs.versions.toml
          echo 'google-devtools-ksp = { id = "com.google.devtools.ksp", version = "1.9.20-1.0.14" }' >> gradle/libs.versions.toml
          echo 'roborazzi = { id = "io.github.takahirom.roborazzi", version = "1.7.0" }' >> gradle/libs.versions.toml
          echo 'google-secrets = { id = "com.google.android.libraries.mapsplatform.secrets-gradle-plugin", version = "2.0.1" }' >> gradle/libs.versions.toml
          echo 'google-services = { id = "com.google.gms.google-services", version = "4.4.0" }' >> gradle/libs.versions.toml

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
